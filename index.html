<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بودرة السدر 🌿</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ─── ALL STYLES (embedded for single-file) ─── */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f6f3ee;
            color: #1f2a24;
            direction: rtl;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(135deg, #e8efe6, #f6f3ee);
            position: relative;
        }

        .hero-image {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.10);
            margin-bottom: 20px;
            max-height: 320px;
            object-fit: cover;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            margin-bottom: 10px;
            color: #1f3a2e;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.8;
        }

        .hero h2 {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #1f3a2e;
            color: white;
            border-radius: 30px;
            font-size: 18px;
        }

        /* FORM SECTION */
        .form-section {
            display: flex;
            justify-content: center;
            padding: 20px 20px 80px;
        }

        form {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        form h3 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: #1f3a2e;
        }

        /* INPUTS */
        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 6px 0 10px;
            border-radius: 12px;
            border: 1px solid #d7e0d8;
            background: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        input:focus,
        select:focus {
            border-color: #6b8f71;
            box-shadow: 0 0 0 3px rgba(107, 143, 113, 0.15);
        }

        label {
            font-weight: 500;
            font-size: 14px;
            display: block;
            margin-top: 4px;
            color: #1f3a2e;
        }

        /* QUANTITY SELECTOR */
        .qty-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0 12px;
            background: #f0f4ef;
            border-radius: 14px;
            padding: 6px 10px;
            border: 1px solid #d7e0d8;
        }

        .qty-wrapper button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            background: #e3ece4;
            color: #1f3a2e;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .qty-wrapper button:hover {
            background: #c6d9c9;
            transform: scale(0.96);
        }

        .qty-wrapper button:active {
            transform: scale(0.90);
        }

        .qty-wrapper input[type="number"] {
            width: 60px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            border: none;
            background: transparent;
            padding: 8px 0;
            margin: 0;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .qty-wrapper input[type="number"]::-webkit-inner-spin-button,
        .qty-wrapper input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .qty-label {
            font-weight: 500;
            font-size: 14px;
            color: #1f3a2e;
            margin-left: auto;
        }

        /* BUTTON */
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            margin-top: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2f5d46, #4c7a5d);
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(47, 93, 70, 0.25);
        }

        /* PRICE BOX */
        #priceBox {
            background: #e9f1ea;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            color: #2f5d46;
            font-weight: 600;
            font-size: 16px;
            margin: 12px 0 4px;
            line-height: 1.6;
        }

        #priceBox .total {
            font-size: 20px;
            color: #1f3a2e;
        }

        /* small note */
        .delivery-note {
            font-size: 12px;
            color: #6e7e76;
            margin-top: -6px;
            margin-bottom: 6px;
            display: block;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .hero h1 {
                font-size: 32px;
            }
            .hero-image {
                max-height: 200px;
            }
            form {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== HERO ========== -->
    <section class="hero">
        <!-- 🖼 IMAGE FROM GITHUB – replace the src with your actual GitHub raw URL -->
        <img
        class="hero-image"
        src="https://github.com/bionovastore/sidr-landing/blob/main/couverture.png"
        alt="بودرة السدر - منتج طبيعي للعناية بالشعر والبشرة"
        onerror="this.style.display='none'"
        />
        <h1>بودرة السدر 🌿</h1>
        <p>منتج طبيعي للعناية بالشعر والبشرة</p>
        <h2>2300 دج <span style="font-size:14px;font-weight:400;">/ للقطعة</span></h2>
    </section>

    <!-- ========== FORM ========== -->
    <section class="form-section">
        <form id="orderForm">
            <h3>اطلبي الآن</h3>

            <!-- Name -->
            <input type="text" id="name" placeholder="الاسم" required />

            <!-- Last name -->
            <input type="text" id="lastname" placeholder="اللقب" required />

            <!-- Phone -->
            <input type="text" id="phone" placeholder="رقم الهاتف" required />

            <!-- Wilaya -->
            <select id="wilaya" required>
                <option value="">اختر الولاية</option>
            </select>

            <!-- Commune -->
            <select id="commune" required>
                <option value="">اختر البلدية</option>
            </select>

            <!-- Delivery method -->
            <select id="delivery">
                <option value="home">توصيل إلى المنزل</option>
                <option value="desk">نقطة تسليم (DHD)</option>
            </select>
            <span class="delivery-note">* عند اختيار "نقطة تسليم" تظهر فقط البلديات التي يغطيها DHD</span>

            <!-- ─── QUANTITY SELECTOR ─── -->
            <label>الكمية</label>
            <div class="qty-wrapper">
                <button type="button" id="qtyMinus" aria-label="إنقاص الكمية">−</button>
                <input type="number" id="quantity" value="1" min="1" max="99" />
                <button type="button" id="qtyPlus" aria-label="زيادة الكمية">+</button>
                <span class="qty-label">قطعة</span>
            </div>

            <!-- Price display -->
            <div id="priceBox"></div>

            <!-- Submit -->
            <button type="submit">احصلي عليه الآن</button>
        </form>
    </section>

            wilayaSelect.innerHTML = '<option value="">اختر الولاية</option>';
            const sorted = Object.keys(algeria).sort();
            sorted.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w;
                opt.textContent = w;
                wilayaSelect.appendChild(opt);
            });
        }

        // ── update communes (with DHD filter if desk) ──
        function updateCommunes() {
            const wilaya = wilayaSelect.value;
            const deliveryMode = deliverySelect.value; // 'home' or 'desk'
            const isDesk = (deliveryMode === 'desk');

            communeSelect.innerHTML = '<option value="">اختر البلدية</option>';

            if (!wilaya || !algeria[wilaya]) return;

            let communes = algeria[wilaya];

            // If desk delivery → filter only DHD communes
            if (isDesk) {
                communes = communes.filter(cm => dhdCommunes.has(cm));
            }

            if (communes.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = isDesk ? '⚠️ لا توجد بلدية متاحة لـ DHD' : '⚠️ لا توجد بلديات';
                opt.disabled = true;
                communeSelect.appendChild(opt);
                return;
            }

            communes.forEach(cm => {
                const opt = document.createElement('option');
                opt.value = cm;
                opt.textContent = cm;
                communeSelect.appendChild(opt);
            });
        }

        // ── update price display ──
        function updatePrice() {
            const wilaya = wilayaSelect.value;
            const deliveryMode = deliverySelect.value;
            const qty = parseInt(qtyInput.value) || 1;

            if (!wilaya || !deliveryPrices[wilaya]) {
                priceBox.innerHTML = '💰 اختر الولاية أولاً';
                return;
            }

            const prices = getPrice(wilaya);
            const deliveryCost = prices[deliveryMode] || 0;

            if (deliveryCost === 0 && deliveryMode === 'desk') {
                priceBox.innerHTML = '⚠️ خدمة نقطة التسليم غير متاحة لهذه الولاية';
                return;
            }

            const productTotal = PRODUCT_PRICE * qty;
            const grandTotal = productTotal + deliveryCost;

            priceBox.innerHTML = `
            🛒 <strong>${qty}</strong> × ${PRODUCT_PRICE} دج = <strong>${productTotal}</strong> دج<br>
            🚚 التوصيل: <strong>${deliveryCost}</strong> دج<br>
            <span class="total">💰 الإجمالي: <strong>${grandTotal}</strong> دج</span>
          `;
        }

        function onDeliveryChange() {
            updateCommunes();
            updatePrice();
        }

        function onWilayaChange() {
            updateCommunes();

        // ── quantity buttons ──
        function setupQuantity() {
            const minus = document.getElementById('qtyMinus');
            const plus = document.getElementById('qtyPlus');

            minus.addEventListener('click', () => {
                let val = parseInt(qtyInput.value) || 1;
                if (val > 1) {
                    qtyInput.value = val - 1;
                    updatePrice();
                }
            });

            plus.addEventListener('click', () => {
                let val = parseInt(qtyInput.value) || 1;
                if (val < 99) {
                    qtyInput.value = val + 1;
                    updatePrice();
                }
            });

            qtyInput.addEventListener('change', () => {
                let val = parseInt(qtyInput.value) || 1;
                if (val < 1) val = 1;
                if (val > 99) val = 99;
                qtyInput.value = val;
                updatePrice();
            });
        }
